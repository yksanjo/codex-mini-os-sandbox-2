<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Mini OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="os-shell">
      <header class="topbar">
        <div class="brand">Codex Mini OS</div>
        <div class="chips">
          <span class="chip" id="agentState">Agent: idle</span>
          <span class="chip" id="cwdChip">cwd: /home/agent</span>
        </div>
      </header>

      <section class="desktop-grid">
        <article class="panel explorer">
          <h2>Virtual Files</h2>
          <div id="fileTree" class="file-tree"></div>
        </article>

        <article class="panel terminal-wrap">
          <h2>Terminal</h2>
          <div id="terminalOutput" class="terminal-output"></div>
          <form id="terminalForm" class="terminal-form">
            <label for="terminalInput">$</label>
            <input id="terminalInput" autocomplete="off" spellcheck="false" />
            <button type="submit">Run</button>
          </form>
        </article>

        <article class="panel agent">
          <h2>Codex Agent Sandbox</h2>
          <p class="muted">
            Agent can only run tool calls approved by your policy. Use the buttons to grant/deny capabilities.
          </p>

          <div class="policy-list">
            <label><input type="checkbox" data-tool="read" checked /> file.read</label>
            <label><input type="checkbox" data-tool="write" checked /> file.write</label>
            <label><input type="checkbox" data-tool="delete" /> file.delete</label>
            <label><input type="checkbox" data-tool="shell" /> shell.exec</label>
          </div>

          <div class="agent-actions">
            <button id="agentPlan">Generate Plan</button>
            <button id="agentStep">Run One Step</button>
            <button id="agentAuto">Auto Run (5)</button>
          </div>

          <div id="agentLog" class="agent-log"></div>
        </article>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
